<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>第二章：山水寻村</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #9f8b65;
      font-family: "Songti SC", "STSong", "SimSun", serif;
      color: #1d1c17;
    }
    .page {
      width: min(760px, 100%);
      margin: 0 auto;
      background: #c8b489;
      box-shadow: 0 20px 60px rgba(28, 21, 13, .35);
    }
    .scroll {
      position: relative;
      height: 2480px;
      overflow: hidden;
      border-left: 1px solid rgba(35, 28, 18, .28);
      border-right: 1px solid rgba(35, 28, 18, .28);
      background: #c8b489;
    }
    .section {
      position: absolute;
      left: 0;
      width: 100%;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      filter: sepia(.38) saturate(.72) contrast(1.05) brightness(.88);
    }
    .top {
      top: 0;
      height: 880px;
      background-image:
        linear-gradient(rgba(90,70,42,.12), rgba(90,70,42,.2)),
        url("https://commons.wikimedia.org/wiki/Special:Redirect/file/%E5%90%B3%E6%AD%B7-%E6%BA%AA%E5%B1%B1%E8%A1%8C%E6%97%85%E5%9C%96.jpg");
      background-position: center top;
    }
    .middle {
      top: 780px;
      height: 820px;
      background-image:
        linear-gradient(rgba(210,190,145,.2), rgba(90,70,42,.18)),
        url("https://commons.wikimedia.org/wiki/Special:Redirect/file/%E5%AF%8C%E6%98%A5%E5%B1%B1%E5%B1%85%E5%9C%96%28%E7%84%A1%E7%94%A8%E5%B8%AB%E5%8D%B7%29.jpg");
      background-size: auto 100%;
      background-position: 46% center;
      opacity: .92;
    }
    .bottom {
      top: 1480px;
      height: 1000px;
      background-image:
        linear-gradient(rgba(90,70,42,.08), rgba(45,35,22,.24)),
        url("https://commons.wikimedia.org/wiki/Special:Redirect/file/%E5%90%B3%E6%AD%B7-%E6%BA%AA%E5%B1%B1%E8%A1%8C%E6%97%85%E5%9C%96.jpg");
      background-position: center bottom;
      transform: scaleX(-1);
    }
    .ink-wash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 8%, transparent 0 18%, rgba(41,31,19,.18) 70%),
        linear-gradient(90deg, rgba(35,25,14,.22), transparent 12%, transparent 88%, rgba(35,25,14,.22));
      mix-blend-mode: multiply;
      z-index: 8;
    }
    .paper-grain {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      opacity: .22;
      background-image:
        linear-gradient(90deg, rgba(34,27,18,.09) 1px, transparent 1px),
        linear-gradient(rgba(34,27,18,.055) 1px, transparent 1px);
      background-size: 27px 27px;
      mix-blend-mode: multiply;
    }
    .mist {
      position: absolute;
      left: -10%;
      width: 120%;
      height: 180px;
      z-index: 14;
      background: linear-gradient(90deg, transparent, rgba(222,211,178,.96), rgba(244,237,213,.94), rgba(222,211,178,.92), transparent);
      filter: blur(18px);
      pointer-events: none;
    }
    .mist.a { top: 720px; }
    .mist.b { top: 1400px; }
    .mist.c { top: 1080px; height: 120px; opacity: .68; }
    .mist.d { top: 1850px; height: 140px; opacity: .72; }
    .river-mask {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }
    .river-mask path {
      fill: none;
      stroke: rgba(44, 65, 68, .55);
      stroke-width: 22;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: blur(.2px);
      opacity: .58;
    }
    .river-mask .light {
      stroke: rgba(235, 229, 205, .5);
      stroke-width: 7;
      opacity: .55;
    }
    .rock-cover {
      position: absolute;
      z-index: 13;
      width: 230px;
      height: 210px;
      background:
        radial-gradient(circle at 40% 26%, rgba(26,31,25,.78), rgba(37,42,31,.55) 46%, rgba(55,48,31,.1) 72%, transparent 74%);
      filter: blur(1px);
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .rock-cover.r1 { left: 42%; top: 365px; }
    .rock-cover.r2 { left: 12%; top: 990px; width: 270px; }
    .rock-cover.r3 { right: 6%; top: 1730px; width: 290px; height: 260px; }
    .title {
      position: fixed;
      top: 24px;
      right: calc(50% - 340px);
      z-index: 40;
      writing-mode: vertical-rl;
      letter-spacing: .22em;
      font-size: 28px;
      font-weight: 700;
      color: rgba(28, 27, 21, .82);
    }
    .seal {
      position: fixed;
      top: 148px;
      right: calc(50% - 338px);
      z-index: 40;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      background: rgba(152, 48, 39, .94);
      color: #f2dfbd;
      font-size: 17px;
      line-height: 1.05;
    }
    .point {
      position: absolute;
      z-index: 30;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(70, 18, 14, .35);
      background: radial-gradient(circle at 34% 28%, #f2dfb7 0 10%, #a93b31 36%, #5f1d17 100%);
      color: #f7ead1;
      display: grid;
      place-items: center;
      font: 700 18px Georgia, serif;
      cursor: pointer;
      transform: translate(-50%, -50%);
      box-shadow: 0 4px 18px rgba(32, 20, 13, .32);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .point:hover, .point.active {
      transform: translate(-50%, -50%) scale(1.18);
      box-shadow: 0 0 0 6px rgba(157, 52, 43, .14), 0 8px 24px rgba(32, 20, 13, .36);
    }
    .label {
      position: absolute;
      z-index: 29;
      transform: translate(-50%, 22px);
      padding: 2px 7px;
      background: rgba(220, 204, 163, .68);
      border: 1px solid rgba(35, 31, 25, .12);
      color: rgba(28, 27, 21, .78);
      font-size: 14px;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(3px);
    }
    .note {
      position: fixed;
      z-index: 60;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: min(430px, calc(100% - 34px));
      display: none;
      padding: 12px 14px;
      background: rgba(226, 211, 173, .92);
      border: 1px solid rgba(35, 31, 25, .16);
      box-shadow: 0 12px 32px rgba(36, 25, 14, .24);
      backdrop-filter: blur(7px);
      text-align: center;
      line-height: 1.7;
    }
    .note.show { display: block; }
    .note .name { font-size: 18px; font-weight: 700; letter-spacing: .06em; }
    .note .desc { font-size: 14px; color: rgba(28, 27, 21, .74); margin-bottom: 8px; }
    .note .hint {
      min-height: 20px;
      margin-top: 8px;
      font-size: 13px;
      color: rgba(88, 43, 32, .82);
    }
    .note button, .password button {
      border: 1px solid rgba(35, 31, 25, .28);
      background: #2b2a22;
      color: #f4e8c9;
      padding: 9px 18px;
      font-family: inherit;
      cursor: pointer;
    }
    .password {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 25%, rgba(230,216,180,.7), transparent 34%),
        rgba(39, 31, 20, .72);
      backdrop-filter: blur(8px);
    }
    .password-box {
      width: min(380px, calc(100% - 36px));
      padding: 28px 24px;
      text-align: center;
      background: rgba(226, 211, 173, .95);
      border: 1px solid rgba(35, 31, 25, .22);
      box-shadow: 0 18px 46px rgba(20, 15, 9, .28);
    }
    .password h1 { margin: 0 0 8px; letter-spacing: .14em; }
    .password p { margin: 0 0 18px; line-height: 1.7; color: rgba(33, 31, 24, .72); }
    .password input {
      width: 100%;
      margin-bottom: 12px;
      padding: 11px 12px;
      border: 1px solid rgba(35, 31, 25, .24);
      background: rgba(248, 241, 219, .8);
      font: 18px Georgia, serif;
      text-align: center;
    }
    .error { min-height: 20px; color: #8c2b24; font-size: 14px; }
    @media (max-width: 760px) {
      .title { right: 22px; font-size: 23px; }
      .seal { right: 26px; }
      .scroll { height: 2200px; }
      .top { height: 790px; }
      .middle { top: 700px; height: 760px; }
      .bottom { top: 1320px; height: 880px; }
      .mist.a { top: 650px; }
      .mist.b { top: 1250px; }
      .label { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="password" id="passwordScreen">
    <div class="password-box">
      <h1>启程前</h1>
      <p>山路隐入画中。输入信封背面的暗号，方可展开地图。</p>
      <input id="passwordInput" type="password" inputmode="numeric" placeholder="输入密码" />
      <button id="passwordBtn">进入</button>
      <div class="error" id="passwordError"></div>
    </div>
  </div>

  <main class="page">
    <section class="scroll">
      <div class="section top"></div>
      <div class="section middle"></div>
      <div class="section bottom"></div>
      <svg class="river-mask" viewBox="0 0 760 2480" preserveAspectRatio="none">
        <path d="M430 130 L300 310 L470 500 L330 720 L510 920 L260 1150 L430 1370 L555 1550 L330 1810 L505 2050 L390 2390" />
        <path class="light" d="M430 130 L300 310 L470 500 L330 720 L510 920 L260 1150 L430 1370 L555 1550 L330 1810 L505 2050 L390 2390" />
      </svg>
      <div class="rock-cover r1"></div>
      <div class="rock-cover r2"></div>
      <div class="rock-cover r3"></div>
      <div class="mist a"></div>
      <div class="mist b"></div>
      <div class="mist c"></div>
      <div class="mist d"></div>
      <div class="ink-wash"></div>
      <div class="paper-grain"></div>
      <div class="title">第二章</div>
      <div class="seal">山<br>行</div>

      <button class="point" data-id="a" style="left: 39%; top: 14%;">甲</button>
      <div class="label" style="left: 39%; top: 14%;">山口孤屋</div>
      <button class="point" data-id="b" style="left: 61%; top: 29%;">乙</button>
      <div class="label" style="left: 61%; top: 29%;">峡边旧渡</div>
      <button class="point" data-id="c" style="left: 42%; top: 47%;">丙</button>
      <div class="label" style="left: 42%; top: 47%;">河湾台地</div>
      <button class="point" data-id="d" style="left: 30%; top: 65%;">丁</button>
      <div class="label" style="left: 30%; top: 65%;">崖下小径</div>
      <button class="point" data-id="e" style="left: 58%; top: 80%;">戊</button>
      <div class="label" style="left: 58%; top: 80%;">下游烟村</div>
    </section>
  </main>

  <div class="note" id="note">
    <div class="name"></div>
    <div class="desc"></div>
    <button id="goNext">确定前往</button>
    <div class="hint" id="openHint"></div>
  </div>

  <script>
    const data = {
      a: ["甲：山口孤屋", "高处孤立，离水远。"],
      b: ["乙：峡边旧渡", "夹谷逼仄，像旧渡口。"],
      c: ["丙：河湾台地", "近水近路，最像村庄。"],
      d: ["丁：崖下小径", "地势低窄，难聚居。"],
      e: ["戊：下游烟村", "有烟火，但路程更远。"]
    };
    let selected = null;
    const passwordScreen = document.getElementById("passwordScreen");
    const passwordInput = document.getElementById("passwordInput");
    const passwordError = document.getElementById("passwordError");
    const note = document.getElementById("note");
    const nameBox = note.querySelector(".name");
    const descBox = note.querySelector(".desc");
    const openHint = document.getElementById("openHint");
    const points = [...document.querySelectorAll(".point")];

    function unlock() {
      if (passwordInput.value === "123") {
        passwordScreen.style.display = "none";
      } else {
        passwordError.textContent = "暗号不对。";
      }
    }

    document.getElementById("passwordBtn").addEventListener("click", unlock);
    passwordInput.addEventListener("keydown", event => {
      if (event.key === "Enter") unlock();
    });

    points.forEach(point => {
      point.addEventListener("click", () => {
        selected = point.dataset.id;
        points.forEach(p => p.classList.remove("active"));
        point.classList.add("active");
        const [name, desc] = data[selected];
        nameBox.textContent = name;
        descBox.textContent = desc;
        openHint.textContent = "";
        note.classList.add("show");
      });
    });

    document.getElementById("goNext").addEventListener("click", () => {
      if (!selected) return;
      const message = {
        type: "chapter2Choice",
        choice: selected,
        time: Date.now()
      };
      localStorage.setItem("chapter2Choice", selected);
      localStorage.setItem("chapter2ChoiceEvent", JSON.stringify(message));
      if ("BroadcastChannel" in window) {
        const channel = new BroadcastChannel("mapStory");
        channel.postMessage(message);
        channel.close();
      }
      openHint.textContent = selected === "c"
        ? "路线已传至第三章。若第三章窗口已打开，雾中村庄会自动显现。"
        : "路线已传至第三章。若第三章窗口已打开，会显现相应的失路结果。";
    });
  </script>
</body>
</html>
